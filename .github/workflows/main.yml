name: Create Module Files For GitHub Release

env:
  # The URL used for the module's "Project URL" link on FoundryVTT's website.
  project_url: "https://github.com/${{github.repository}}"

  # A URL that will always point to the latest manifest.
  # FoundryVTT uses this URL to check whether the current module version that
  # is installed is the latest version. This URL should NOT change,
  # otherwise FoundryVTT won't be able to perform this check.
  latest_manifest_url: "https://github.com/${{github.repository}}/releases/latest/download/module.json"

  # The URL to the module archive associated with the module release being
  # processed by this workflow.
  release_module_url: "https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.zip"

  # The URL to the manifest associated with the module release being processed
  # by this workflow. Foundry's package release API expects a version-specific
  # manifest URL for the release being published.
  release_manifest_url: "https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.json"

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1

      - name: Install Vite+
        run: vp install --no-frozen-lockfile --ignore-scripts vite-plus@0.1.22 -- --no-audit --no-fund

      - name: Build
        run: vp build

      - name: Modify Module Manifest With Release-Specific Values
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          jq --arg version "${TAG_NAME#v}" \
             --arg url "${{ env.project_url }}" \
             --arg manifest "${{ env.latest_manifest_url }}" \
             --arg download "${{ env.release_module_url }}" \
             '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
             module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Create Module Archive
        run: |
          zip                                    \
            --recurse-paths                      \
            ./module.zip                         \
            module.json                          \
            CHANGELOG.md                         \
            LICENSE                              \
            dist/                                \
            lang/

      - name: Update Release With Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ github.event.release.name }}
          draft: false
          prerelease: ${{ github.event.release.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./module.json, ./module.zip"
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}

  publish-to-foundry:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    env:
      FVTT_TOKEN: ${{ secrets.FVTT_TOKEN }}

    steps:
      - name: Download Manifest From Release
        run: curl -fsSL "${{ env.release_manifest_url }}" -o module.json

      - name: Setup Node
        uses: actions/setup-node@v7

      - name: Publish Release To Foundry
        run: |
          npx @ghost-fvtt/foundry-publish@4.0.0 \
            --manifestPath ./module.json \
            --manifestURL "${{ env.release_manifest_url }}" \
            --changelogURL "${{ github.event.release.html_url }}"
